#textdomain wesnoth-Milestones

# =============================================================================
# PART I — IDENTITY
# Chapter 1: "A Stranger in Strange Lands"
#
# PURPOSE (template note):
#   This is the simplest possible playable scenario.  Use it as the foundation
#   for any combat scenario in your own campaign.
#
# Key WML concepts demonstrated:
#   • [scenario]            — mandatory attributes every scenario needs
#   • [side]                — defining the human player and an AI opponent
#   • map_data              — inline hex-grid terrain
#   • [objectives]          — displaying win/lose conditions to the player
#   • [event] name=prestart — show objectives before the map is rendered
#   • [event] name=start    — opening dialog once the map is visible
#   • [event] name=victory  — reward and transition on winning
#   • [event] name=defeat   — narrative and cleanup on losing
#   • [message]             — character dialogue
#   • [endlevel]            — close the scenario with a specific result
#   • [gold_carryover]      — control how much gold carries to the next map
# =============================================================================

[scenario]
    id=p1_chapter1
    name= _ "Chapter 1: A Stranger in Strange Lands"
    next_scenario=p1_chapter2

    # ── Map ───────────────────────────────────────────────────────────────────
    # Replace this placeholder map with your own terrain design.
    # Common terrain codes:
    #   Gg = grassland    Hh = hills        Ff = forest      Mm = mountain
    #   Ke = keep         Uu = castle wall  Cv = village     Ww = deep water
    #   Re = road         Aa = dirt/arid    Dd = desert      Ss = swamp
    #
    # The map is a rectangular hex grid.  Each cell is two characters.
    # Player castle: keep (Ke) at column 3, row 5.
    # Enemy  castle: keep (Ke) at column 13, row 7.
    map_data="
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Ff Ff Gg Gg Gg Gg Gg Gg Gg Gg Ff Ff Gg Gg
Gg Ff Ff Gg Gg Cv Gg Gg Gg Gg Cv Gg Gg Ff Gg Gg
Gg Gg Gg Gg Gg Gg Gg Hh Hh Gg Gg Gg Gg Gg Gg Gg
Gg Uu Ke Gg Gg Gg Hh Hh Hh Gg Gg Gg Gg Gg Gg Gg
Gg Uu Uu Gg Gg Gg Hh Gg Gg Gg Gg Gg Uu Uu Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Ke Uu Gg Gg
Gg Gg Gg Gg Gg Gg Gg Hh Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Cv Gg Gg Gg Gg Hh Hh Gg Gg Cv Gg Gg Gg Gg
Gg Gg Gg Ff Gg Gg Gg Gg Gg Gg Gg Gg Ff Gg Gg Gg
Gg Gg Gg Gg Ff Ff Gg Gg Gg Ff Ff Gg Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
"

    # Number of turns before the player automatically loses.
    # Use -1 for an unlimited-turn scenario.
    turns=20

    # When yes, the scenario ends in victory the moment all enemy leaders are
    # dead and all enemy sides have no recruitable units left.
    victory_when_enemies_defeated=yes

    # ── Side 1: Human Player ──────────────────────────────────────────────────
    [side]
        side=1
        controller=human
        team_name=heroes
        user_team_name= _ "Heroes"

        # Starting gold.  Scale by difficulty:
        #   #ifdef EASY   gold=120 #endif
        #   #ifdef NORMAL gold=100 #endif
        #   #ifdef HARD   gold=80  #endif
        gold=100

        # The leader unit.  'canrecruit=yes' lets this unit recruit from the
        # keep tile.  x and y are 1-based column / row coordinates on the map.
        [unit]
            type=Horseman
            id=hero
            name= _ "Aldric"
            canrecruit=yes
            x=3
            y=5
        [/unit]
    [/side]

    # ── Side 2: AI Opponent ───────────────────────────────────────────────────
    [side]
        side=2
        controller=ai
        team_name=enemies
        user_team_name= _ "Raiders"
        gold=80

        [unit]
            type=Dark Adept
            id=raider_chief
            name= _ "Raider Chief"
            canrecruit=yes
            x=13
            y=7
        [/unit]
    [/side]

    # ── Prestart: show objectives before the map is rendered ──────────────────
    [event]
        name=prestart

        # [objectives] displays the scenario win/lose conditions in the sidebar.
        # It is shown once here and can be updated mid-scenario as goals change.
        [objectives]
            side=1
            [objective]
                description= _ "Defeat the Raider Chief"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Aldric"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            # [gold_carryover] controls how much gold the player brings forward.
            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]
    [/event]

    # ── Start: opening dialogue ───────────────────────────────────────────────
    [event]
        name=start

        # [message] shows a speech bubble for a unit identified by 'speaker'.
        # Use the unit's id, or the keywords: narrator, unit, second_unit.
        [message]
            speaker=hero
            message= _ "Raiders — here, in these very fields? Something is very wrong."
        [/message]

        [message]
            speaker=raider_chief
            message= _ "Your lands are ours now, fool. Surrender or die!"
        [/message]

        [message]
            speaker=hero
            message= _ "I think not."
        [/message]
    [/event]

    # ── Victory ───────────────────────────────────────────────────────────────
    [event]
        name=victory

        [message]
            speaker=hero
            message= _ "The raiders are driven off — but who sent them? I must find out."
        [/message]

        [endlevel]
            result=victory
            bonus=yes
            carryover_percentage=40
            # carryover_add=no means the carryover gold replaces (not adds to)
            # any existing carryover.
            carryover_add=no
            linger_mode=yes
        [/endlevel]
    [/event]

    # ── Defeat ────────────────────────────────────────────────────────────────
    [event]
        name=defeat

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Aldric has fallen. His story ends here."
        [/message]

        [endlevel]
            result=defeat
            linger_mode=yes
        [/endlevel]
    [/event]
[/scenario]
