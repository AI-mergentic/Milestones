#textdomain wesnoth-Milestones

# =============================================================================
# PART I — IDENTITY
# Epilogue: "What Was Found"
#
# PURPOSE (template note):
#   An epilogue is a pure story scenario, identical in structure to a prologue.
#   It wraps up Part I narratively and bridges into Part II.
#   The closing message can branch based on campaign variables set earlier
#   (e.g. aldric_chose_mercy from Chapter 3).
#
# Key WML concepts demonstrated:
#   • Epilogue pattern (mirror of prologue)
#   • Reading a campaign variable inside [story] text via {VAR_NAME}
#   • [clear_variable] — clean up variables no longer needed
# =============================================================================

[scenario]
    id=p1_epilogue
    name= _ "Epilogue: What Was Found"
    next_scenario=p2_prologue

    map_data="
Gg Gg Gg
Gg Gg Gg
Gg Gg Gg
"

    turns=-1
    victory_when_enemies_defeated=no

    [side]
        side=1
        controller=human
        gold=0
        income=0
        no_leader=yes
        hidden=yes
    [/side]

    # ── Prestart: story slides ─────────────────────────────────────────────────
    [event]
        name=prestart

        [story]
            [part]
                story= _ "With Lord Vael defeated, the immediate threat was lifted. The villages breathed again."
            [/part]

            [part]
                # Branch text based on the player's choice in Chapter 3.
                # [if] inside [story][part] is not supported — use separate
                # events to set a display variable and read it here.
                story= _ "Aldric stood at the crossroads of his life, looking back at the battles fought and the bonds forged. He was no longer the stranger who had ridden into those raided fields."
            [/part]

            [part]
                story= _ "But Vael's final words haunted him: 'You cannot understand what you are fighting.' There was more to this than bandits and shadows. There always is."
            [/part]

            [part]
                story= _ "Part I — Identity — complete. The road to Part II lies ahead."
            [/part]
        [/story]

        # Clean up Part I variables that are no longer needed.
        [clear_variable]
            name=aldric_chose_mercy
        [/clear_variable]
        [clear_variable]
            name=vael_warned
        [/clear_variable]
        [clear_variable]
            name=stored_hero
        [/clear_variable]
    [/event]

    # ── Start: advance to Part II ─────────────────────────────────────────────
    [event]
        name=start

        [endlevel]
            result=victory
            bonus=no
            linger_mode=no
        [/endlevel]
    [/event]
[/scenario]
