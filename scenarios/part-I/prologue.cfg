#textdomain wesnoth-Milestones

# =============================================================================
# PART I — IDENTITY
# Prologue: "The First Step"
#
# PURPOSE (template note):
#   A prologue is a pure story scenario.  It shows full-screen narrative slides
#   and then immediately advances to the first playable chapter.  There is no
#   map interaction; the map below is a minimal placeholder required by the
#   engine.
#
# Key WML concepts demonstrated:
#   • [story] / [part]   — full-screen cinematic narrative slides
#   • [event] name=prestart — fires before the map is ever rendered
#   • [event] name=start    — fires once the map is visible to the player
#   • [endlevel]            — immediately close a scenario
#   • linger_mode=no        — skip the end-of-scenario stats screen
# =============================================================================

[scenario]
    id=p1_prologue
    name= _ "Prologue: The First Step"

    # The scenario that the engine loads when this one ends with result=victory.
    next_scenario=p1_chapter1

    # A minimal placeholder map.  Prologue/epilogue scenarios do not need an
    # interactive map, but the engine still requires the map_data attribute.
    map_data="
Gg Gg Gg
Gg Gg Gg
Gg Gg Gg
"

    # -1 means unlimited turns; the scenario ends through an event, not by
    # running out of turns.
    turns=-1

    # Disable the automatic victory trigger (there are no enemy units).
    victory_when_enemies_defeated=no

    # ── Side 1: Observer slot (required by the engine) ────────────────────────
    [side]
        side=1
        controller=human
        gold=0
        income=0
        # no_leader=yes suppresses the "missing leader" engine warning.
        no_leader=yes
        hidden=yes
    [/side]

    # ── Prestart: show story slides before the map is rendered ────────────────
    # The prestart event fires before the player ever sees the map.
    # This is the correct place for [story] cinematic slides.
    [event]
        name=prestart

        # [story] contains one or more [part] slides shown in sequence.
        # Players click / press Enter to advance between slides.
        [story]
            # Optional: a background image shown for every [part] in this
            # [story] block unless a [part] overrides it.
            # background=data/core/images/story/aragwaithi.png

            [part]
                # 'story' is the body text displayed on the slide.
                story= _ "The land of Irdya has known many heroes — but their names were not written down until they had already passed into legend."
                # You can override the background per part:
                # background=data/core/images/story/...
            [/part]

            [part]
                story= _ "This is the story of one such hero. It begins, as all great stories do, with a single step into the unknown."
            [/part]

            [part]
                story= _ "Remember: who you are shapes what you will become. The journey is the milestone."
            [/part]
        [/story]
    [/event]

    # ── Start: advance immediately to Chapter 1 ───────────────────────────────
    # The start event fires once the map is shown.  We end the scenario right
    # away so the player transitions seamlessly into the first chapter.
    [event]
        name=start

        [endlevel]
            result=victory
            bonus=no
            # linger_mode=no skips the post-scenario gold/experience screen.
            linger_mode=no
        [/endlevel]
    [/event]
[/scenario]
