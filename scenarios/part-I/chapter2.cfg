#textdomain wesnoth-Milestones

# =============================================================================
# PART I — IDENTITY
# Chapter 2: "Bonds of Loyalty"
#
# PURPOSE (template note):
#   An escort/protection scenario.  The hero must guide an NPC safely to the
#   exit while enemies pursue.  This chapter shows how to:
#     • place allied non-recruit units on the map
#     • track a specific unit's survival as a victory condition
#     • fire events when a unit reaches a specific location
#
# Key WML concepts demonstrated:
#   • [unit]             — placing units directly on the map via events
#   • [have_unit]        — condition: check whether a unit exists / is alive
#   • [move_unit_fake]   — animate a unit moving without actually moving it
#   • [terrain_filter]   — filter events by map location type
#   • [filter_location]  — constrain an event trigger to a map rectangle
#   • [filter]           — filter which unit triggers an event
#   • victory_when_enemies_defeated=no — manual victory/defeat control
# =============================================================================

[scenario]
    id=p1_chapter2
    name= _ "Chapter 2: Bonds of Loyalty"
    next_scenario=p1_chapter3

    map_data="
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Ff Ff Ff Gg Gg Gg Gg Ff Ff Ff Gg Gg Gg Gg
Gg Ff Ff Gg Gg Cv Gg Gg Cv Gg Gg Ff Ff Gg Gg Gg
Gg Gg Gg Gg Gg Gg Re Re Re Re Gg Gg Gg Gg Gg Gg
Gg Uu Ke Gg Gg Re Gg Gg Gg Re Gg Gg Gg Gg Gg Gg
Gg Uu Uu Gg Re Gg Hh Hh Gg Re Gg Gg Gg Gg Gg Gg
Gg Gg Gg Re Gg Hh Hh Hh Hh Gg Re Gg Uu Uu Gg Gg
Gg Gg Re Gg Gg Hh Gg Gg Hh Gg Gg Re Ke Uu Gg Gg
Gg Re Gg Cv Gg Gg Gg Gg Gg Cv Gg Gg Re Gg Gg Gg
Re Gg Gg Gg Ff Ff Gg Gg Ff Ff Gg Gg Gg Re Gg Gg
Gg Gg Gg Gg Gg Ff Ff Ff Ff Gg Gg Gg Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
"

    turns=18
    # We manage victory ourselves, so disable the automatic trigger.
    victory_when_enemies_defeated=no

    # ── Side 1: Human Player ──────────────────────────────────────────────────
    [side]
        side=1
        controller=human
        team_name=heroes
        user_team_name= _ "Heroes"
        gold=80

        [unit]
            type=Horseman
            id=hero
            name= _ "Aldric"
            canrecruit=yes
            x=3
            y=5
        [/unit]
    [/side]

    # ── Side 2: Pursuing Enemies ──────────────────────────────────────────────
    [side]
        side=2
        controller=ai
        team_name=enemies
        user_team_name= _ "Pursuers"
        gold=60

        [unit]
            type=Orcish Warrior
            id=orc_captain
            name= _ "Gor'kash"
            canrecruit=yes
            x=13
            y=8
        [/unit]
    [/side]

    # ── Prestart ──────────────────────────────────────────────────────────────
    [event]
        name=prestart

        [objectives]
            side=1
            [objective]
                description= _ "Escort Mira to the road crossing (bottom-left)"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Aldric"
                condition=lose
            [/objective]
            [objective]
                description= _ "Death of Mira"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]

        # Place the escort NPC.  Units placed in [event] blocks are not
        # recruits and do not count as leaders — they are map-present units.
        [unit]
            type=Peasant
            id=mira
            name= _ "Mira"
            side=1
            x=4
            y=6
            # A unit with no 'canrecruit' attribute defaults to canrecruit=no.
        [/unit]
    [/event]

    # ── Start: introduction ───────────────────────────────────────────────────
    [event]
        name=start

        [message]
            speaker=mira
            message= _ "Aldric! The orcs are right behind us. We must reach the road crossing — it is our only way out!"
        [/message]

        [message]
            speaker=hero
            message= _ "Stay close to me, Mira. I will cut a path through."
        [/message]
    [/event]

    # ── Victory trigger: Mira reaches the exit area ───────────────────────────
    # [event] name=moveto fires whenever any unit moves onto a matching hex.
    [event]
        name=moveto

        # [filter] restricts the event to the unit 'mira'.
        [filter]
            id=mira
        [/filter]

        # [filter_location] restricts the trigger to a rectangular area on
        # the map.  Here the exit is the bottom-left road section (x=1, y=10).
        [filter_location]
            x=1
            y=10
        [/filter_location]

        [message]
            speaker=mira
            message= _ "We made it! The road is clear ahead."
        [/message]

        [message]
            speaker=hero
            message= _ "Run — do not stop until you reach the village. I will hold them off."
        [/message]

        [endlevel]
            result=victory
            bonus=yes
            carryover_percentage=40
            carryover_add=no
            linger_mode=yes
        [/endlevel]
    [/event]

    # ── Defeat trigger: Mira is killed ────────────────────────────────────────
    [event]
        name=die

        [filter]
            id=mira
        [/filter]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Mira has been slain. Aldric could not keep his promise."
        [/message]

        [endlevel]
            result=defeat
            linger_mode=yes
        [/endlevel]
    [/event]

    # ── Defeat trigger: Aldric is killed ──────────────────────────────────────
    [event]
        name=defeat

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Aldric has fallen. Without him, Mira has no chance."
        [/message]

        [endlevel]
            result=defeat
            linger_mode=yes
        [/endlevel]
    [/event]
[/scenario]
