#textdomain wesnoth-Milestones

# =============================================================================
# PART I — IDENTITY
# Chapter 3: "The Weight of Choice"
#
# PURPOSE (template note):
#   A dialogue-heavy scenario with branching outcomes based on player choices.
#   This chapter introduces campaign-persistent variables so that decisions
#   made here can influence later scenarios.
#
# Key WML concepts demonstrated:
#   • [set_variable]         — store a value in a WML variable
#   • [if] / [then] / [else] — conditional branching inside events
#   • [option]               — player-choice menu inside [message]
#   • [have_unit]            — condition block: check unit presence
#   • campaign variables     — variables persist across scenarios via savegame
#   • [store_unit]           — copy a unit's data into a variable for later use
# =============================================================================

[scenario]
    id=p1_chapter3
    name= _ "Chapter 3: The Weight of Choice"
    next_scenario=p1_chapter4

    map_data="
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Hh Hh Gg Ff Ff Gg Gg Ff Ff Gg Hh Hh Gg Gg Gg
Gg Hh Gg Gg Ff Gg Cv Gg Cv Gg Ff Gg Hh Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Uu Ke Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Uu Uu Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Ke Uu Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Uu Uu Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Cv Gg Ff Gg Gg Gg Gg Ff Gg Cv Gg Gg Gg Gg
Gg Hh Hh Gg Ff Ff Gg Gg Ff Ff Gg Hh Hh Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
"

    turns=25
    victory_when_enemies_defeated=yes

    # ── Side 1: Human Player ──────────────────────────────────────────────────
    [side]
        side=1
        controller=human
        team_name=heroes
        user_team_name= _ "Heroes"
        gold=100

        [unit]
            type=Horseman
            id=hero
            name= _ "Aldric"
            canrecruit=yes
            x=3
            y=5
        [/unit]
    [/side]

    # ── Side 2: Bandits ───────────────────────────────────────────────────────
    [side]
        side=2
        controller=ai
        team_name=enemies
        user_team_name= _ "Bandits"
        gold=80

        [unit]
            type=Bandit
            id=bandit_lord
            name= _ "Scar"
            canrecruit=yes
            x=14
            y=6
        [/unit]
    [/side]

    # ── Side 3: Neutral Village Elder (not hostile) ───────────────────────────
    # Placing a side with no units here is a pattern for "story" sides.
    # The elder unit is placed via an event instead.
    [side]
        side=3
        controller=null
        team_name=neutral
        user_team_name= _ "Villagers"
        gold=0
        no_leader=yes
        hidden=yes
    [/side]

    # ── Prestart ──────────────────────────────────────────────────────────────
    [event]
        name=prestart

        [objectives]
            side=1
            [objective]
                description= _ "Defeat the Bandit Lord"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Aldric"
                condition=lose
            [/objective]
            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]

        # Initialise a campaign variable that tracks the player's moral choice.
        # Using 'value' with a literal string is the simplest form.
        [set_variable]
            name=aldric_chose_mercy
            value=no
        [/set_variable]

        # Place the village elder NPC on the map.
        [unit]
            type=Elder
            id=elder_tomas
            name= _ "Elder Tomas"
            side=3
            x=7
            y=3
        [/unit]
    [/event]

    # ── Start: moral choice dialogue ──────────────────────────────────────────
    [event]
        name=start

        [message]
            speaker=elder_tomas
            message= _ "Hero! The bandits hold our village hostage. Their lord, Scar, demands tribute — if we pay, he spares us. What would you advise?"
        [/message]

        # [option] inside [message] creates a player-choice menu.
        # Each [option] is one selectable line.
        [message]
            speaker=hero

            [option]
                label= _ "Pay the tribute and negotiate. Lives matter more than gold."
                # Each [option] can contain WML commands executed on selection.
                [command]
                    [set_variable]
                        name=aldric_chose_mercy
                        value=yes
                    [/set_variable]
                    [message]
                        speaker=hero
                        message= _ "We will pay for now — but Scar must be brought to justice eventually."
                    [/message]
                [/command]
            [/option]

            [option]
                label= _ "Refuse. We fight — no tribute will be paid to criminals."
                [command]
                    [set_variable]
                        name=aldric_chose_mercy
                        value=no
                    [/set_variable]
                    [message]
                        speaker=hero
                        message= _ "Your village will not be extorted. Stand firm — I will deal with Scar myself."
                    [/message]
                [/command]
            [/option]
        [/message]
    [/event]

    # ── Conditional mid-scenario event ────────────────────────────────────────
    # If the player chose mercy, the elder provides a bonus unit at turn 3.
    [event]
        name=turn 3

        # [if] evaluates a condition and branches to [then] or [else].
        [if]
            # [variable] tests a WML variable.  operator can be:
            #   equals, not_equals, less_than, greater_than, contains
            [variable]
                name=aldric_chose_mercy
                equals=yes
            [/variable]
            [then]
                [message]
                    speaker=elder_tomas
                    message= _ "The village militia will fight with you, Aldric. You earned their trust."
                [/message]
                # Spawn a bonus unit as a reward for the merciful choice.
                [unit]
                    type=Spearman
                    name= _ "Village Guard"
                    side=1
                    x=4
                    y=4
                [/unit]
            [/then]
            [else]
                [message]
                    speaker=elder_tomas
                    message= _ "Scar will not forgive this. He has sent for reinforcements."
                [/message]
                # Spawn extra enemies as a consequence of the harder choice.
                [unit]
                    type=Footpad
                    side=2
                    x=12
                    y=5
                [/unit]
            [/else]
        [/if]
    [/event]

    # ── Victory ───────────────────────────────────────────────────────────────
    [event]
        name=victory

        # [store_unit] saves a unit's current stats (hp, experience, items)
        # into a WML variable so they can be recalled in a later scenario.
        [store_unit]
            [filter]
                id=hero
            [/filter]
            variable=stored_hero
            kill=no
        [/store_unit]

        # Branch the closing message based on earlier choice.
        [if]
            [variable]
                name=aldric_chose_mercy
                equals=yes
            [/variable]
            [then]
                [message]
                    speaker=hero
                    message= _ "Scar is gone. The village is free — and I learned that mercy can be its own kind of strength."
                [/message]
            [/then]
            [else]
                [message]
                    speaker=hero
                    message= _ "Scar is defeated. The village is free — though the cost of refusal was steep."
                [/message]
            [/else]
        [/if]

        [endlevel]
            result=victory
            bonus=yes
            carryover_percentage=40
            carryover_add=no
            linger_mode=yes
        [/endlevel]
    [/event]

    # ── Defeat ────────────────────────────────────────────────────────────────
    [event]
        name=defeat

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Aldric has fallen. His choices, both merciful and hard, are forgotten."
        [/message]

        [endlevel]
            result=defeat
            linger_mode=yes
        [/endlevel]
    [/event]
[/scenario]
