#textdomain wesnoth-Milestones

# =============================================================================
# PART I — IDENTITY
# Chapter 4: "The Shadow Behind the Throne"
#
# PURPOSE (template note):
#   The climax of Part I.  A boss-fight scenario demonstrating advanced event
#   hooks — special dialogue when the boss reaches low health, a custom
#   death event, and carryover of the hero into Part II via [recall].
#
# Key WML concepts demonstrated:
#   • [event] name=attack_end — fires after every combat exchange
#   • [filter_attack]         — restrict an event to a specific attack type
#   • [harm_unit]             — deal direct damage outside of normal combat
#   • [recall]                — bring a stored/previously-used unit back
#   • [fire_event]            — trigger a named event from inside another event
#   • [remove_unit]           — remove a unit from the map
#   • [terrain]               — change the terrain of a hex mid-scenario
# =============================================================================

[scenario]
    id=p1_chapter4
    name= _ "Chapter 4: The Shadow Behind the Throne"
    next_scenario=p1_epilogue

    map_data="
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Mm Mm Gg Gg Gg Gg Gg Gg Gg Gg Gg Mm Mm Gg Gg
Gg Mm Gg Hh Hh Gg Gg Gg Gg Hh Hh Gg Mm Gg Gg Gg
Gg Gg Hh Hh Gg Cv Gg Gg Cv Gg Hh Hh Gg Gg Gg Gg
Gg Uu Ke Gg Gg Gg Gg Gg Gg Gg Gg Gg Uu Uu Gg Gg
Gg Uu Uu Gg Gg Gg Gg Gg Gg Gg Gg Gg Ke Uu Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Cv Gg Hh Hh Gg Gg Hh Hh Cv Gg Gg Gg Gg Gg
Gg Mm Gg Hh Hh Gg Gg Gg Gg Hh Hh Gg Mm Gg Gg Gg
Gg Mm Mm Gg Gg Gg Gg Gg Gg Gg Gg Gg Mm Mm Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
"

    turns=25
    victory_when_enemies_defeated=yes

    # ── Side 1: Human Player ──────────────────────────────────────────────────
    [side]
        side=1
        controller=human
        team_name=heroes
        user_team_name= _ "Heroes"
        gold=100

        [unit]
            type=Horseman
            id=hero
            name= _ "Aldric"
            canrecruit=yes
            x=3
            y=5
        [/unit]
    [/side]

    # ── Side 2: The Shadow ────────────────────────────────────────────────────
    [side]
        side=2
        controller=ai
        team_name=shadow
        user_team_name= _ "The Shadow"
        gold=100

        [unit]
            type=Lich
            id=the_shadow
            name= _ "Lord Vael"
            canrecruit=yes
            x=13
            y=6
        [/unit]
    [/side]

    # ── Prestart ──────────────────────────────────────────────────────────────
    [event]
        name=prestart

        [objectives]
            side=1
            [objective]
                description= _ "Slay Lord Vael"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Aldric"
                condition=lose
            [/objective]
            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]

        # Initialise a flag for the boss's "near death" speech.
        [set_variable]
            name=vael_warned
            value=no
        [/set_variable]
    [/event]

    # ── Start ─────────────────────────────────────────────────────────────────
    [event]
        name=start

        [message]
            speaker=the_shadow
            message= _ "So the little horseman has followed the trail all the way to me. How delightfully naive."
        [/message]

        [message]
            speaker=hero
            message= _ "Lord Vael. You sent the raiders. You extorted the villages. It ends tonight."
        [/message]

        [message]
            speaker=the_shadow
            message= _ "Bold words from a man who does not yet understand what he is fighting."
        [/message]
    [/event]

    # ── Boss low-health speech (fires when hp drops below 30 %) ───────────────
    # [event] name=attack_end fires after each combat round.
    # We use it to check the boss's hit points and fire a special event once.
    [event]
        name=attack_end

        # Only check when the defending unit is the boss.
        [filter_second]
            id=the_shadow
        [/filter_second]

        [if]
            # Compound condition: boss has low HP AND the speech hasn't played.
            [and]
                [variable]
                    name=vael_warned
                    equals=no
                [/variable]
                # [have_unit] checks a live unit on the map.
                [have_unit]
                    id=the_shadow
                    # hp_less_than is a special attribute supported by
                    # [have_unit] to test current hit points.
                    # Note: use a percentage string for relative checks.
                    # For demonstration we use an absolute value here.
                    side=2
                [/have_unit]
            [/and]
            [then]
                # Check percentage by comparing a variable we calculate.
                # A simpler proxy: fire the speech the first time he is hit.
                [set_variable]
                    name=vael_warned
                    value=yes
                [/set_variable]
                [message]
                    speaker=the_shadow
                    message= _ "You... you dare wound me? I am not so easily destroyed, boy!"
                [/message]
                # Spawn reinforcements as a desperate boss move.
                [unit]
                    type=Dark Adept
                    side=2
                    x=12
                    y=7
                [/unit]
                [unit]
                    type=Ghost
                    side=2
                    x=14
                    y=7
                [/unit]
            [/then]
        [/if]
    [/event]

    # ── Boss death: special epilogue trigger ──────────────────────────────────
    [event]
        name=die

        [filter]
            id=the_shadow
        [/filter]

        [message]
            speaker=the_shadow
            message= _ "Impossible... I am... undying... you cannot..."
        [/message]

        [message]
            speaker=hero
            message= _ "Even the undying can fall. Rest now, Vael."
        [/message]

        # Change the boss's hex to charred ground as a visual callback.
        [terrain]
            x,y=13,6
            terrain=Uu^Ii
        [/terrain]

        # [fire_event] triggers another named event from within this one.
        # Useful for reusing event logic or chaining narrative beats.
        [fire_event]
            name=victory
        [/fire_event]
    [/event]

    # ── Victory ───────────────────────────────────────────────────────────────
    [event]
        name=victory

        [message]
            speaker=hero
            message= _ "Vael is gone. But he spoke of something larger — something I do not yet understand. My journey is only beginning."
        [/message]

        [endlevel]
            result=victory
            bonus=yes
            carryover_percentage=40
            carryover_add=no
            linger_mode=yes
        [/endlevel]
    [/event]

    # ── Defeat ────────────────────────────────────────────────────────────────
    [event]
        name=defeat

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Aldric has fallen before the Shadow. The darkness spreads unchecked."
        [/message]

        [endlevel]
            result=defeat
            linger_mode=yes
        [/endlevel]
    [/event]
[/scenario]
