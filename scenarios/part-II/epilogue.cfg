#textdomain wesnoth-Milestones

# =============================================================================
# PART II — DISCOVERY
# Epilogue: "What Was Learned"
#
# PURPOSE (template note):
#   The epilogue for Part II.  Closes the Discovery arc and bridges into
#   Part III (Struggle).  Identical structure to the Part I epilogue.
# =============================================================================

[scenario]
    id=p2_epilogue
    name= _ "Part II Epilogue: What Was Learned"
    next_scenario=p3_prologue

    map_data="
Gg Gg Gg
Gg Gg Gg
Gg Gg Gg
"

    turns=-1
    victory_when_enemies_defeated=no

    [side]
        side=1
        controller=human
        gold=0
        income=0
        no_leader=yes
        hidden=yes
    [/side]

    [event]
        name=prestart

        [story]
            [part]
                story= _ "The cult was more than a criminal organisation. It was the tip of a spear pointed at the heart of the kingdom — and Aldric now knew who held the shaft."
            [/part]

            [part]
                story= _ "He had survived the fog, outraced a herald, navigated cursed ruins, and held a fortress against impossible odds. He was no longer the same man who had ridden east."
            [/part]

            [part]
                story= _ "Discovery had given him knowledge. Now he had to decide what to do with it."
            [/part]

            [part]
                story= _ "Part II — Discovery — complete. The final reckoning awaits."
            [/part]
        [/story]
    [/event]

    [event]
        name=start

        [endlevel]
            result=victory
            bonus=no
            linger_mode=no
        [/endlevel]
    [/event]
[/scenario]
