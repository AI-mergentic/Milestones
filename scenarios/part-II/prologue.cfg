#textdomain wesnoth-Milestones

# =============================================================================
# PART II — DISCOVERY
# Prologue: "Wider Horizons"
#
# PURPOSE (template note):
#   The prologue for Part II.  Structurally identical to the Part I prologue;
#   duplicated here so each part is self-contained and easy to copy as a
#   starting point for a new campaign's prologue.
#
# Key WML concepts demonstrated (recap):
#   • [story] / [part]        — full-screen narrative slides
#   • [event] name=prestart   — fires before the map renders
#   • [event] name=start      — fires once the map is visible
#   • [endlevel] linger_mode=no — seamless scenario transition
# =============================================================================

[scenario]
    id=p2_prologue
    name= _ "Part II Prologue: Wider Horizons"
    next_scenario=p2_chapter1

    map_data="
Gg Gg Gg
Gg Gg Gg
Gg Gg Gg
"

    turns=-1
    victory_when_enemies_defeated=no

    [side]
        side=1
        controller=human
        gold=0
        income=0
        no_leader=yes
        hidden=yes
    [/side]

    [event]
        name=prestart

        [story]
            [part]
                story= _ "The defeat of Lord Vael was only the beginning. Beyond the familiar fields and forests, a wider world awaited — one full of secrets, factions, and forgotten truths."
            [/part]

            [part]
                story= _ "Aldric rode east, following the last clue Vael had let slip: a name. A place. A conspiracy older than he could imagine."
            [/part]

            [part]
                story= _ "Part II: Discovery."
            [/part]
        [/story]
    [/event]

    [event]
        name=start

        [endlevel]
            result=victory
            bonus=no
            linger_mode=no
        [/endlevel]
    [/event]
[/scenario]
