#textdomain wesnoth-Milestones

# =============================================================================
# PART II — DISCOVERY
# Chapter 1: "Into the Fog"
#
# PURPOSE (template note):
#   An exploration scenario using Wesnoth's shroud and fog-of-war systems.
#   The player starts blind and must scout to find objectives and enemies.
#
# Key WML concepts demonstrated:
#   • shroud=yes / fog=yes    — enable shroud (permanent black) and/or fog
#   • [remove_shroud]         — reveal a rectangle of the map
#   • [place_shroud]          — re-hide a rectangle of the map
#   • [event] name=sighted    — fires when a unit first spots an enemy
#   • [event] name=discover   — fires when fog lifts over a location
#   • [teleport]              — instantly move a unit to a new hex
# =============================================================================

[scenario]
    id=p2_chapter1
    name= _ "Chapter 1: Into the Fog"
    next_scenario=p2_chapter2

    map_data="
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Ff Ff Gg Gg Gg Gg Gg Gg Gg Gg Gg Ff Ff Gg Gg
Gg Ff Gg Gg Gg Cv Gg Gg Cv Gg Gg Gg Gg Ff Gg Gg
Gg Gg Gg Gg Gg Gg Hh Hh Hh Gg Gg Gg Gg Gg Gg Gg
Gg Uu Ke Gg Gg Hh Hh Gg Hh Hh Gg Gg Gg Gg Gg Gg
Gg Uu Uu Gg Gg Hh Gg Gg Gg Hh Gg Gg Uu Uu Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Ke Uu Gg Gg
Gg Gg Gg Gg Gg Hh Gg Gg Gg Hh Gg Gg Gg Gg Gg Gg
Gg Gg Cv Gg Gg Hh Hh Gg Hh Hh Cv Gg Gg Gg Gg Gg
Gg Ff Gg Gg Gg Gg Hh Hh Hh Gg Gg Gg Gg Ff Gg Gg
Gg Ff Ff Gg Gg Gg Gg Gg Gg Gg Gg Gg Ff Ff Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
"

    turns=30
    victory_when_enemies_defeated=yes

    # Enable full shroud (black unexplored areas) for side 1.
    # Units reveal tiles within their vision range as they move.
    [side]
        side=1
        controller=human
        team_name=heroes
        user_team_name= _ "Heroes"
        gold=100
        # shroud=yes means areas are permanently dark until a unit visits them.
        shroud=yes
        # fog=yes means areas re-darken when no friendly unit can see them.
        # Use one or both depending on the exploration feel you want.
        fog=yes

        [unit]
            type=Ranger
            id=hero
            name= _ "Aldric"
            canrecruit=yes
            x=3
            y=5
        [/unit]
    [/side]

    [side]
        side=2
        controller=ai
        team_name=cult
        user_team_name= _ "Cult Sentinels"
        gold=80

        [unit]
            type=Dark Adept
            id=cult_warden
            name= _ "Cult Warden"
            canrecruit=yes
            x=13
            y=7
        [/unit]
    [/side]

    # ── Prestart ──────────────────────────────────────────────────────────────
    [event]
        name=prestart

        [objectives]
            side=1
            [objective]
                description= _ "Slay the Cult Warden"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Aldric"
                condition=lose
            [/objective]
            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]

        # Reveal only the immediate area around the player's starting castle.
        # Coordinates use x1,y1,x2,y2 to define a rectangle.
        [remove_shroud]
            side=1
            x=1,2,3,4,5
            y=3,4,5,6,7
        [/remove_shroud]
    [/event]

    # ── Start ─────────────────────────────────────────────────────────────────
    [event]
        name=start

        [message]
            speaker=hero
            message= _ "The valley is cloaked in mist. The cult's sentinels could be anywhere — I must scout carefully."
        [/message]
    [/event]

    # ── Sighted event: first enemy contact ────────────────────────────────────
    # The 'sighted' event fires the first time side 1 spots a side 2 unit.
    [event]
        name=sighted
        # Only fire once.
        first_time_only=yes

        [filter]
            side=2
        [/filter]

        [filter_second]
            side=1
        [/filter_second]

        [message]
            speaker=hero
            message= _ "There — a cultist! They are everywhere in this valley."
        [/message]
    [/event]

    # ── Village discovery: bonus gold ─────────────────────────────────────────
    [event]
        name=capture
        first_time_only=yes

        [filter]
            id=hero
        [/filter]

        [message]
            speaker=hero
            message= _ "This village has supplies we can use."
        [/message]

        # [gold] adds gold to the specified side.
        [gold]
            side=1
            amount=20
        [/gold]
    [/event]

    # ── Victory ───────────────────────────────────────────────────────────────
    [event]
        name=victory

        [message]
            speaker=hero
            message= _ "The warden is dead. But the cult's trail leads deeper into the valley."
        [/message]

        [endlevel]
            result=victory
            bonus=yes
            carryover_percentage=40
            carryover_add=no
            linger_mode=yes
        [/endlevel]
    [/event]

    # ── Defeat ────────────────────────────────────────────────────────────────
    [event]
        name=defeat

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Lost in the fog, Aldric never found his way through the valley."
        [/message]

        [endlevel]
            result=defeat
            linger_mode=yes
        [/endlevel]
    [/event]
[/scenario]
