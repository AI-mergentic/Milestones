#textdomain wesnoth-Milestones

# =============================================================================
# PART II — DISCOVERY
# Chapter 4: "Ancient Ground"
#
# PURPOSE (template note):
#   A scenario featuring special terrain and unit-ability interactions.
#   Shows how to change terrain dynamically, apply status effects, and create
#   special "ability" scenarios through WML events.
#
# Key WML concepts demonstrated:
#   • [terrain]              — change one or more hexes to different terrain
#   • [status]               — apply a status effect to a unit (e.g. poisoned)
#   • [heal_unit]            — heal a unit for a fixed amount outside combat
#   • [transform_unit]       — change a unit's type mid-scenario
#   • [modify_unit]          — alter a unit's attributes (hp, gold, etc.)
#   • [event] name=enter_hex — fires when a unit steps onto a specific hex
# =============================================================================

[scenario]
    id=p2_chapter4
    name= _ "Chapter 4: Ancient Ground"
    next_scenario=p2_chapter5

    map_data="
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Ss Ss Gg Gg Gg Aa Aa Aa Gg Gg Ss Ss Gg Gg Gg
Gg Ss Gg Gg Cv Gg Aa Gg Aa Gg Cv Gg Ss Gg Gg Gg
Gg Gg Gg Gg Gg Gg Aa Aa Aa Gg Gg Gg Gg Gg Gg Gg
Gg Uu Ke Gg Gg Gg Gg Gg Gg Gg Gg Gg Ke Uu Gg Gg
Gg Uu Uu Gg Gg Gg Gg Gg Gg Gg Gg Gg Uu Uu Gg Gg
Gg Gg Gg Gg Gg Gg Aa Aa Aa Gg Gg Gg Gg Gg Gg Gg
Gg Gg Cv Gg Gg Gg Aa Gg Aa Gg Cv Gg Gg Gg Gg Gg
Gg Ss Gg Gg Gg Gg Aa Aa Aa Gg Gg Gg Ss Gg Gg Gg
Gg Ss Ss Gg Gg Gg Gg Gg Gg Gg Gg Ss Ss Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
"

    turns=22
    victory_when_enemies_defeated=yes

    # ── Side 1: Human Player ──────────────────────────────────────────────────
    [side]
        side=1
        controller=human
        team_name=heroes
        user_team_name= _ "Heroes"
        gold=100

        [unit]
            type=Ranger
            id=hero
            name= _ "Aldric"
            canrecruit=yes
            x=3
            y=5
        [/unit]
    [/side]

    # ── Side 2: Ancient Guardians ─────────────────────────────────────────────
    [side]
        side=2
        controller=ai
        team_name=guardians
        user_team_name= _ "Ancient Guardians"
        gold=80

        [unit]
            type=Ancient Wose
            id=stone_guardian
            name= _ "Stone Guardian"
            canrecruit=yes
            x=13
            y=5
        [/unit]
    [/side]

    # ── Prestart ──────────────────────────────────────────────────────────────
    [event]
        name=prestart

        [objectives]
            side=1
            [objective]
                description= _ "Defeat the Stone Guardian"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Aldric"
                condition=lose
            [/objective]
            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]
    [/event]

    # ── Start ─────────────────────────────────────────────────────────────────
    [event]
        name=start

        [message]
            speaker=hero
            message= _ "Ancient ruins — and the guardians that come with them. The sandy ground and the ash-covered stones are treacherous. Watch every step."
        [/message]
    [/event]

    # ── Cursed ground: entering the central ruin poisons the unit ─────────────
    # The 'enter_hex' event fires when any unit moves onto a matching hex.
    [event]
        name=enter_hex

        # The central ruin tiles are the 'Aa' cluster at x=7-9, y=6-8.
        [filter_location]
            x=7,8,9
            y=6,7,8
        [/filter_location]

        # Only affect human-controlled units (to give the player a challenge).
        [filter]
            side=1
        [/filter]

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "The ancient ground is cursed! The unit is weakened."
        [/message]

        # Apply the 'poisoned' status to the unit that just entered the hex.
        # [filter] inside [status] identifies the target unit.
        [status]
            [filter]
                x=x
                y=y
            [/filter]
            poisoned=yes
        [/status]
    [/event]

    # ── Healing spring: stepping on the sand heals ────────────────────────────
    [event]
        name=enter_hex
        first_time_only=no

        [filter_location]
            x=2,3
            y=2,3
        [/filter_location]

        [filter]
            side=1
        [/filter]

        # [heal_unit] heals the unit by a fixed number of hit points.
        [heal_unit]
            [filter]
                x=x
                y=y
            [/filter]
            amount=4
            # animate=yes shows the healing animation.
            animate=yes
        [/heal_unit]
    [/event]

    # ── Victory ───────────────────────────────────────────────────────────────
    [event]
        name=victory

        [message]
            speaker=hero
            message= _ "The guardian crumbles. These ruins hold knowledge the cult was seeking — I must not let them have it."
        [/message]

        [endlevel]
            result=victory
            bonus=yes
            carryover_percentage=40
            carryover_add=no
            linger_mode=yes
        [/endlevel]
    [/event]

    # ── Defeat ────────────────────────────────────────────────────────────────
    [event]
        name=defeat

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "The ancient ground claimed Aldric before he could uncover its secrets."
        [/message]

        [endlevel]
            result=defeat
            linger_mode=yes
        [/endlevel]
    [/event]
[/scenario]
