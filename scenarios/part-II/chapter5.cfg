#textdomain wesnoth-Milestones

# =============================================================================
# PART II — DISCOVERY
# Chapter 5: "The Endless Tide"
#
# PURPOSE (template note):
#   A multi-wave scenario.  New enemy units spawn periodically from off-map
#   edges, simulating an endless assault that the player must outlast for a
#   fixed number of turns before reinforcements arrive and turn the tide.
#
# Key WML concepts demonstrated:
#   • [event] name=side N turn — fires at the start of side N's turn N
#   • [unit] placed at map edge — units that march in from off-screen
#   • [set_variable] add       — turn counter
#   • Survival objective pattern (hold for N turns)
#   • [animate_unit]           — play a unit's animation in an event
# =============================================================================

[scenario]
    id=p2_chapter5
    name= _ "Chapter 5: The Endless Tide"
    next_scenario=p2_epilogue

    map_data="
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Ff Ff Gg Gg Gg Gg Gg Gg Gg Gg Ff Ff Gg Gg Gg
Gg Ff Gg Gg Cv Gg Gg Gg Cv Gg Gg Gg Ff Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Uu Ke Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Uu Uu Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Cv Gg Gg Gg Gg Gg Gg Gg Cv Gg Gg Gg Gg Gg
Gg Ff Gg Gg Gg Gg Gg Gg Gg Gg Gg Ff Gg Gg Gg Gg
Gg Ff Ff Gg Gg Gg Gg Gg Gg Gg Ff Ff Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
"

    # The player must survive for 10 turns; then reinforcements arrive.
    turns=14
    victory_when_enemies_defeated=no

    # ── Side 1: Besieged Heroes ───────────────────────────────────────────────
    [side]
        side=1
        controller=human
        team_name=heroes
        user_team_name= _ "Heroes"
        gold=60

        [unit]
            type=Ranger
            id=hero
            name= _ "Aldric"
            canrecruit=yes
            x=3
            y=5
        [/unit]
    [/side]

    # ── Side 2: Cult Assault Waves ────────────────────────────────────────────
    [side]
        side=2
        controller=ai
        team_name=cult
        user_team_name= _ "Cult Assault"
        gold=0
        income=0
        # The AI gets no natural income — all reinforcements come from events.
        no_leader=yes
    [/side]

    # ── Side 3: Relief Force (arrives at turn 10) ─────────────────────────────
    [side]
        side=3
        controller=human
        team_name=heroes
        user_team_name= _ "Relief Force"
        gold=0
        no_leader=yes
        hidden=yes
    [/side]

    # ── Prestart ──────────────────────────────────────────────────────────────
    [event]
        name=prestart

        [set_variable]
            name=waves_survived
            value=0
        [/set_variable]

        [objectives]
            side=1
            [objective]
                description= _ "Survive 10 turns until reinforcements arrive"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Aldric"
                condition=lose
            [/objective]
            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]
    [/event]

    # ── Start ─────────────────────────────────────────────────────────────────
    [event]
        name=start

        [message]
            speaker=hero
            message= _ "There are too many of them! We cannot break through — we must hold this position until help arrives. Ten turns. Hold for ten turns!"
        [/message]
    [/event]

    # ── Wave 1 (Turn 1): first assault ────────────────────────────────────────
    # Enemies are placed on the right edge (x=16) and march westward.
    [event]
        name=turn 1

        [unit]
            type=Dark Adept
            side=2
            x=16
            y=3
        [/unit]
        [unit]
            type=Footpad
            side=2
            x=16
            y=6
        [/unit]
        [unit]
            type=Footpad
            side=2
            x=16
            y=9
        [/unit]
    [/event]

    # ── Wave 2 (Turn 3): second assault ──────────────────────────────────────
    [event]
        name=turn 3

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "A second wave approaches from the east!"
        [/message]

        [unit]
            type=Dark Adept
            side=2
            x=16
            y=2
        [/unit]
        [unit]
            type=Orcish Crossbowman
            side=2
            x=16
            y=5
        [/unit]
        [unit]
            type=Orcish Crossbowman
            side=2
            x=16
            y=8
        [/unit]

        [set_variable]
            name=waves_survived
            add=1
        [/set_variable]
    [/event]

    # ── Wave 3 (Turn 6): major push ───────────────────────────────────────────
    [event]
        name=turn 6

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "A major assault! Hold the line!"
        [/message]

        [unit]
            type=Orcish Warrior
            side=2
            x=16
            y=1
        [/unit]
        [unit]
            type=Orcish Warrior
            side=2
            x=16
            y=4
        [/unit]
        [unit]
            type=Dark Adept
            side=2
            x=16
            y=7
        [/unit]
        [unit]
            type=Orcish Warrior
            side=2
            x=16
            y=10
        [/unit]

        [set_variable]
            name=waves_survived
            add=1
        [/set_variable]
    [/event]

    # ── Turn 10: relief force arrives and victory triggers ────────────────────
    [event]
        name=turn 10

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Horns from the west — the relief force has arrived!"
        [/message]

        # Reveal the hidden relief-force side and spawn their units.
        [unit]
            type=Paladin
            name= _ "Commander Ysel"
            id=relief_commander
            side=3
            x=1
            y=5
        [/unit]
        [unit]
            type=Spearman
            side=3
            x=1
            y=3
        [/unit]
        [unit]
            type=Spearman
            side=3
            x=1
            y=7
        [/unit]

        [message]
            speaker=relief_commander
            message= _ "Hold on, Aldric! We are with you now!"
        [/message]

        [message]
            speaker=hero
            message= _ "Just in time. Let us finish this!"
        [/message]

        # Grant victory immediately — the player has survived.
        [endlevel]
            result=victory
            bonus=yes
            carryover_percentage=40
            carryover_add=no
            linger_mode=yes
        [/endlevel]
    [/event]

    # ── Defeat trigger: Aldric falls ──────────────────────────────────────────
    [event]
        name=defeat

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Aldric could not hold on long enough. The tide overwhelmed him."
        [/message]

        [endlevel]
            result=defeat
            linger_mode=yes
        [/endlevel]
    [/event]

    # ── Clean up ──────────────────────────────────────────────────────────────
    [event]
        name=victory

        [clear_variable]
            name=waves_survived
        [/clear_variable]
    [/event]
[/scenario]
