#textdomain wesnoth-Milestones

# =============================================================================
# PART II — DISCOVERY
# Chapter 2: "Three Stones"
#
# PURPOSE (template note):
#   A multi-objective scenario.  The player must capture three specific
#   landmark locations before the enemy does.  This teaches location-based
#   event triggers and how to track progress with variables.
#
# Key WML concepts demonstrated:
#   • [event] name=capture    — fires when a side captures a village
#   • [filter_location]       — restrict an event to specific coordinates
#   • [set_variable] add=     — increment a numeric variable
#   • [variable] greater_than — numeric comparison
#   • Updating [objectives] mid-scenario
# =============================================================================

[scenario]
    id=p2_chapter2
    name= _ "Chapter 2: Three Stones"
    next_scenario=p2_chapter3

    map_data="
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Hh Hh Gg Gg Gg Gg Gg Gg Gg Gg Gg Hh Hh Gg Gg
Gg Hh Gg Cv Gg Gg Gg Gg Gg Gg Cv Gg Gg Hh Gg Gg
Gg Gg Cv Gg Gg Gg Gg Gg Gg Gg Gg Cv Gg Gg Gg Gg
Gg Uu Ke Gg Gg Gg Cv Gg Cv Gg Gg Gg Gg Gg Gg Gg
Gg Uu Uu Gg Gg Gg Gg Gg Gg Gg Gg Gg Ke Uu Gg Gg
Gg Gg Gg Gg Gg Gg Cv Gg Cv Gg Gg Gg Uu Uu Gg Gg
Gg Gg Cv Gg Gg Gg Gg Gg Gg Gg Gg Cv Gg Gg Gg Gg
Gg Hh Gg Cv Gg Gg Gg Gg Gg Gg Cv Gg Gg Hh Gg Gg
Gg Hh Hh Gg Gg Gg Gg Gg Gg Gg Gg Gg Hh Hh Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
"

    turns=20
    victory_when_enemies_defeated=no

    # ── Side 1: Human Player ──────────────────────────────────────────────────
    [side]
        side=1
        controller=human
        team_name=heroes
        user_team_name= _ "Heroes"
        gold=100

        [unit]
            type=Ranger
            id=hero
            name= _ "Aldric"
            canrecruit=yes
            x=3
            y=5
        [/unit]
    [/side]

    # ── Side 2: Rival Faction ─────────────────────────────────────────────────
    [side]
        side=2
        controller=ai
        team_name=cult
        user_team_name= _ "Cult Scouts"
        gold=90

        [unit]
            type=Dark Adept
            id=cult_scout_leader
            name= _ "Scout Master"
            canrecruit=yes
            x=13
            y=6
        [/unit]
    [/side]

    # ── Prestart ──────────────────────────────────────────────────────────────
    [event]
        name=prestart

        # Counter: how many of the three landmark villages the player controls.
        [set_variable]
            name=landmarks_captured
            value=0
        [/set_variable]

        [objectives]
            side=1
            [objective]
                # Note: objectives text can embed raw numbers if needed.
                description= _ "Capture all three Landmark Stones (0/3)"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Aldric"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]
    [/event]

    # ── Start ─────────────────────────────────────────────────────────────────
    [event]
        name=start

        [message]
            speaker=hero
            message= _ "The Three Stones — ancient landmarks. The cult is already moving to claim them. We must get there first."
        [/message]
    [/event]

    # ── Landmark A captured (x=7, y=5) ───────────────────────────────────────
    # The 'capture' event fires whenever any unit captures a village.
    [event]
        name=capture
        first_time_only=yes

        [filter]
            side=1
        [/filter]

        [filter_location]
            x=7
            y=5
        [/filter_location]

        [message]
            speaker=hero
            message= _ "The first Stone is ours."
        [/message]

        # Increment the counter using the 'add' operator.
        [set_variable]
            name=landmarks_captured
            add=1
        [/set_variable]

        # Check for victory after each capture.
        [fire_event]
            name=check_victory
        [/fire_event]
    [/event]

    # ── Landmark B captured (x=9, y=5) ───────────────────────────────────────
    [event]
        name=capture
        first_time_only=yes

        [filter]
            side=1
        [/filter]

        [filter_location]
            x=9
            y=5
        [/filter_location]

        [message]
            speaker=hero
            message= _ "The second Stone! One more remains."
        [/message]

        [set_variable]
            name=landmarks_captured
            add=1
        [/set_variable]

        [fire_event]
            name=check_victory
        [/fire_event]
    [/event]

    # ── Landmark C captured (x=7, y=7 or x=9, y=7) ───────────────────────────
    [event]
        name=capture
        first_time_only=yes

        [filter]
            side=1
        [/filter]

        [filter_location]
            x=7
            y=7
        [/filter_location]

        [message]
            speaker=hero
            message= _ "The third Stone — all three are in our hands!"
        [/message]

        [set_variable]
            name=landmarks_captured
            add=1
        [/set_variable]

        [fire_event]
            name=check_victory
        [/fire_event]
    [/event]

    # ── Internal victory check ────────────────────────────────────────────────
    # This named event is fired by each capture event above.
    [event]
        name=check_victory

        [if]
            [variable]
                name=landmarks_captured
                greater_than_equal_to=3
            [/variable]
            [then]
                [fire_event]
                    name=victory
                [/fire_event]
            [/then]
        [/if]
    [/event]

    # ── Victory ───────────────────────────────────────────────────────────────
    [event]
        name=victory

        [message]
            speaker=hero
            message= _ "All three Stones secured. The cult's ritual cannot proceed without them."
        [/message]

        [clear_variable]
            name=landmarks_captured
        [/clear_variable]

        [endlevel]
            result=victory
            bonus=yes
            carryover_percentage=40
            carryover_add=no
            linger_mode=yes
        [/endlevel]
    [/event]

    # ── Defeat ────────────────────────────────────────────────────────────────
    [event]
        name=defeat

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Aldric could not claim the Three Stones in time."
        [/message]

        [endlevel]
            result=defeat
            linger_mode=yes
        [/endlevel]
    [/event]
[/scenario]
