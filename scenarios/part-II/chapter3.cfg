#textdomain wesnoth-Milestones

# =============================================================================
# PART II — DISCOVERY
# Chapter 3: "Against the Clock"
#
# PURPOSE (template note):
#   A timed scenario.  The player has a hard turn limit and must race to
#   complete the objective before time runs out.  Shows per-turn events that
#   add pressure and provide narrative tension through countdown messages.
#
# Key WML concepts demonstrated:
#   • [event] name=turn N     — fires at the start of a specific turn
#   • [event] name=turn end   — fires at the end of every turn
#   • [scroll_to]             — pan the camera to a map location
#   • [sound]                 — play a sound effect mid-event
#   • [delay]                 — pause execution briefly for dramatic effect
#   • [label]                 — place a text label on a map hex
# =============================================================================

[scenario]
    id=p2_chapter3
    name= _ "Chapter 3: Against the Clock"
    next_scenario=p2_chapter4

    map_data="
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Ff Ff Gg Gg Gg Gg Gg Gg Gg Gg Ff Ff Gg Gg Gg
Gg Ff Gg Gg Cv Gg Gg Gg Cv Gg Gg Gg Ff Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Uu Ke Gg Gg Gg Gg Gg Gg Gg Gg Ke Uu Gg Gg Gg
Gg Uu Uu Gg Gg Gg Gg Gg Gg Gg Gg Uu Uu Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Cv Gg Gg Gg Gg Gg Gg Gg Cv Gg Gg Gg Gg Gg
Gg Ff Gg Gg Gg Gg Gg Gg Gg Gg Gg Ff Gg Gg Gg Gg
Gg Ff Ff Gg Gg Gg Gg Gg Gg Gg Ff Ff Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
"

    # Hard turn limit — the race against time.
    turns=12
    victory_when_enemies_defeated=yes

    # ── Side 1: Human Player ──────────────────────────────────────────────────
    [side]
        side=1
        controller=human
        team_name=heroes
        user_team_name= _ "Heroes"
        gold=100

        [unit]
            type=Ranger
            id=hero
            name= _ "Aldric"
            canrecruit=yes
            x=3
            y=5
        [/unit]
    [/side]

    # ── Side 2: Escaping Cult Leader ──────────────────────────────────────────
    [side]
        side=2
        controller=ai
        team_name=cult
        user_team_name= _ "Fleeing Cultists"
        gold=70

        [unit]
            type=Dark Sorcerer
            id=cult_herald
            name= _ "Herald Morn"
            canrecruit=yes
            x=12
            y=5
        [/unit]
    [/side]

    # ── Prestart ──────────────────────────────────────────────────────────────
    [event]
        name=prestart

        [objectives]
            side=1
            [objective]
                description= _ "Slay Herald Morn before he escapes (12 turns)"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Aldric"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out — Morn escapes"
                condition=lose
            [/objective]
            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]

        # Place a label on the enemy keep to mark the escape point.
        [label]
            x=12
            y=5
            text= _ "Escape Point"
        [/label]
    [/event]

    # ── Start ─────────────────────────────────────────────────────────────────
    [event]
        name=start

        [message]
            speaker=cult_herald
            message= _ "You will never catch me, Aldric! By the time you reach me, I will be gone — and the ritual complete!"
        [/message]

        [message]
            speaker=hero
            message= _ "Not today, Morn. Not today."
        [/message]
    [/event]

    # ── Turn 4: first countdown warning ───────────────────────────────────────
    [event]
        name=turn 4

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "8 turns remain. Morn is already preparing his escape."
        [/message]

        # Pan the camera to the enemy position to show urgency.
        [scroll_to]
            x=12
            y=5
            check_fogged=no
        [/scroll_to]
    [/event]

    # ── Turn 8: urgent countdown ──────────────────────────────────────────────
    [event]
        name=turn 8

        [message]
            speaker=cult_herald
            message= _ "Half your time is gone! You are already too late!"
        [/message]

        [message]
            speaker=hero
            message= _ "Close now — just a little further!"
        [/message]

        # Spawn a small blocking unit to increase tension.
        [unit]
            type=Dark Adept
            side=2
            x=8
            y=5
        [/unit]
    [/event]

    # ── Turn 11: final warning ────────────────────────────────────────────────
    [event]
        name=turn 11

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Final turn! Morn is almost gone — strike now or he escapes forever."
        [/message]
    [/event]

    # ── Time runs out: defeat ─────────────────────────────────────────────────
    # When turns=12 and turn 13 would start, Wesnoth fires the 'time over'
    # event (which then triggers the scenario defeat path).
    [event]
        name=time over

        [message]
            speaker=cult_herald
            message= _ "Ha! Too slow, hero. The ritual begins now — and there is nothing you can do."
        [/message]

        [endlevel]
            result=defeat
            linger_mode=yes
        [/endlevel]
    [/event]

    # ── Victory ───────────────────────────────────────────────────────────────
    [event]
        name=victory

        [message]
            speaker=hero
            message= _ "Morn is dead. The ritual is stopped — for now. But what was he trying to complete?"
        [/message]

        [endlevel]
            result=victory
            bonus=yes
            carryover_percentage=40
            carryover_add=no
            linger_mode=yes
        [/endlevel]
    [/event]

    # ── Defeat ────────────────────────────────────────────────────────────────
    [event]
        name=defeat

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Aldric fell before he could reach Morn."
        [/message]

        [endlevel]
            result=defeat
            linger_mode=yes
        [/endlevel]
    [/event]
[/scenario]
