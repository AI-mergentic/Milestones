#textdomain wesnoth-Milestones

# =============================================================================
# PART III — STRUGGLE
# Epilogue: "The Last Milestone"
#
# PURPOSE (template note):
#   The campaign's closing cinematic.  Ends the campaign with result=victory
#   and next_scenario=null so Wesnoth shows the campaign-complete screen.
#
# Key WML concepts demonstrated:
#   • next_scenario=null      — signals the end of the campaign
#   • result=victory on final — triggers the campaign-won celebration screen
# =============================================================================

[scenario]
    id=p3_epilogue
    name= _ "Epilogue: The Last Milestone"

    # Setting next_scenario=null tells Wesnoth this is the last scenario.
    # The engine shows the campaign-victory screen instead of loading another
    # scenario.
    next_scenario=null

    map_data="
Gg Gg Gg
Gg Gg Gg
Gg Gg Gg
"

    turns=-1
    victory_when_enemies_defeated=no

    [side]
        side=1
        controller=human
        gold=0
        income=0
        no_leader=yes
        hidden=yes
    [/side]

    # ── Prestart: closing story ────────────────────────────────────────────────
    [event]
        name=prestart

        [story]
            [part]
                story= _ "The Architect's towers crumbled. The conspiracy that had stretched across half the kingdom dissolved like morning frost."
            [/part]

            [part]
                story= _ "Aldric did not seek a reward. The villages were freed. The roads were safe. That was enough."
            [/part]

            [part]
                story= _ "He rode on — not because there was another enemy, but because there was always another road. Another milestone to reach."
            [/part]

            [part]
                story= _ "And in the end, that is what identity truly is: not a fixed point, but a direction."
            [/part]

            [part]
                story= _ "— fin —"
            [/part]
        [/story]
    [/event]

    # ── Start: end the campaign ───────────────────────────────────────────────
    [event]
        name=start

        # This [endlevel] with result=victory and next_scenario=null closes
        # the entire campaign and shows the victory credits.
        [endlevel]
            result=victory
            bonus=no
            linger_mode=no
        [/endlevel]
    [/event]
[/scenario]
