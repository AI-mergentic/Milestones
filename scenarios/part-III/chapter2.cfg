#textdomain wesnoth-Milestones

# =============================================================================
# PART III — STRUGGLE
# Chapter 2: "Unlikely Allies"
#
# PURPOSE (template note):
#   An alliance/diplomacy scenario.  The player begins with a neutral faction
#   on the field; through in-game dialogue they can win that faction over,
#   converting them from neutral to allied.  Shows how to manipulate side
#   relationships mid-scenario.
#
# Key WML concepts demonstrated:
#   • [change_side]           — move a unit from one side to another
#   • [diplomatic_action]     — change the alliance state between sides
#   • [allow_undo]            — control whether the player can undo moves
#   • [item]                  — place a pick-up item on a hex
#   • [event] name=pick up    — fires when a unit collects an item
#   • Multi-team dynamics     — three sides with shifting relationships
# =============================================================================

[scenario]
    id=p3_chapter2
    name= _ "Chapter 2: Unlikely Allies"
    next_scenario=p3_chapter3

    map_data="
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Hh Hh Gg Gg Gg Gg Gg Gg Gg Gg Hh Hh Gg Gg Gg
Gg Hh Gg Gg Cv Gg Gg Gg Cv Gg Gg Gg Hh Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Uu Ke Gg Gg Gg Gg Gg Gg Gg Gg Ke Uu Gg Gg Gg
Gg Uu Uu Gg Gg Gg Gg Gg Gg Gg Gg Uu Uu Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Ke Gg Ke Gg Gg Gg Gg Gg Gg Gg
Gg Hh Gg Gg Cv Gg Uu Gg Uu Gg Cv Gg Hh Gg Gg Gg
Gg Hh Hh Gg Gg Gg Gg Gg Gg Gg Gg Hh Hh Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
"

    turns=25
    victory_when_enemies_defeated=no

    # ── Side 1: Human Player ──────────────────────────────────────────────────
    [side]
        side=1
        controller=human
        team_name=heroes
        user_team_name= _ "Heroes"
        gold=100

        [unit]
            type=General
            id=hero
            name= _ "Aldric"
            canrecruit=yes
            x=3
            y=5
        [/unit]
    [/side]

    # ── Side 2: Cult Remnant ──────────────────────────────────────────────────
    [side]
        side=2
        controller=ai
        team_name=cult
        user_team_name= _ "Cult Remnant"
        gold=80

        [unit]
            type=Dark Sorcerer
            id=cult_remnant_lord
            name= _ "Arch-Warlock Dred"
            canrecruit=yes
            x=12
            y=5
        [/unit]
    [/side]

    # ── Side 3: Neutral Outcasts (start neither allied nor enemy) ─────────────
    [side]
        side=3
        controller=ai
        # Shares team with neither heroes nor cult — they are their own faction.
        team_name=outcasts
        user_team_name= _ "Outcast Warband"
        gold=60

        [unit]
            type=Orcish Warrior
            id=outcast_warchief
            name= _ "Grak"
            canrecruit=yes
            x=7
            y=8
        [/unit]
    [/side]

    # ── Prestart ──────────────────────────────────────────────────────────────
    [event]
        name=prestart

        [set_variable]
            name=grak_allied
            value=no
        [/set_variable]

        [objectives]
            side=1
            [objective]
                description= _ "Slay Arch-Warlock Dred"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Aldric"
                condition=lose
            [/objective]
            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]

        # Place a treaty scroll item on the map between the two potential allies.
        # [item] displays an icon on a hex; [event] name=pick up collects it.
        [item]
            x=6
            y=7
            image=items/scroll-old.png
            name= _ "Treaty Scroll"
            description= _ "An ancient treaty between humans and the Outcast Warband. Perhaps Grak would honour it."
        [/item]
    [/event]

    # ── Start ─────────────────────────────────────────────────────────────────
    [event]
        name=start

        [message]
            speaker=outcast_warchief
            message= _ "Humans and their wars. You will stay out of Grak's territory — or Grak will add you to the pile."
        [/message]

        [message]
            speaker=hero
            message= _ "I have no quarrel with you, Grak. But the cult does — and once they have dealt with me, they will come for you next."
        [/message]

        [message]
            speaker=outcast_warchief
            message= _ "Grak will think on this."
        [/message]
    [/event]

    # ── Player picks up the treaty scroll ─────────────────────────────────────
    [event]
        name=moveto
        first_time_only=yes

        [filter]
            id=hero
        [/filter]

        [filter_location]
            x=6
            y=7
        [/filter_location]

        [message]
            speaker=hero
            message= _ "An ancient treaty scroll. If Grak is a warrior of his word, this may be the key to an alliance."
        [/message]

        [set_variable]
            name=has_treaty_scroll
            value=yes
        [/set_variable]

        # Remove the item from the map.
        [remove_item]
            x=6
            y=7
        [/remove_item]
    [/event]

    # ── Aldric speaks with Grak: offer the alliance ───────────────────────────
    [event]
        name=moveto
        first_time_only=yes

        [filter]
            id=hero
        [/filter]

        # Adjacent to Grak's keep.
        [filter_location]
            x=7,8,9
            y=7,8,9
        [/filter_location]

        [if]
            [variable]
                name=has_treaty_scroll
                equals=yes
            [/variable]
            [then]
                [message]
                    speaker=hero
                    message= _ "Grak. I carry the treaty scroll of your ancestors. Will you fight beside me — against the cult that threatens us both?"
                [/message]

                [message]
                    speaker=outcast_warchief
                    message= _ "The scroll... yes. Grak's ancestors swore to honour this. Very well, human. We fight together — but only until the cult is destroyed."
                [/message]

                [set_variable]
                    name=grak_allied
                    value=yes
                [/set_variable]

                # Change side 3 to ally with side 1 by sharing team name.
                # The diplomatic_action tag signals an alliance.
                [modify_side]
                    side=3
                    team_name=heroes
                [/modify_side]

                [message]
                    speaker=narrator
                    image=wesnoth-icon.png
                    message= _ "The Outcast Warband has joined the Heroes!"
                [/message]
            [/then]
            [else]
                [message]
                    speaker=outcast_warchief
                    message= _ "You have no proof, human. Come back when you have something to offer."
                [/message]
            [/else]
        [/if]
    [/event]

    # ── Victory ───────────────────────────────────────────────────────────────
    [event]
        name=die

        [filter]
            id=cult_remnant_lord
        [/filter]

        [message]
            speaker=hero
            message= _ "Dred is defeated. The cult is broken."
        [/message]

        [if]
            [variable]
                name=grak_allied
                equals=yes
            [/variable]
            [then]
                [message]
                    speaker=outcast_warchief
                    message= _ "A good fight, human. Grak honours the alliance."
                [/message]
            [/then]
        [/if]

        [fire_event]
            name=victory
        [/fire_event]
    [/event]

    [event]
        name=victory

        [clear_variable]
            name=grak_allied
        [/clear_variable]
        [clear_variable]
            name=has_treaty_scroll
        [/clear_variable]

        [endlevel]
            result=victory
            bonus=yes
            carryover_percentage=40
            carryover_add=no
            linger_mode=yes
        [/endlevel]
    [/event]

    # ── Defeat ────────────────────────────────────────────────────────────────
    [event]
        name=defeat

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Aldric has fallen. The unlikely alliance was not enough."
        [/message]

        [endlevel]
            result=defeat
            linger_mode=yes
        [/endlevel]
    [/event]
[/scenario]
