#textdomain wesnoth-Milestones

# =============================================================================
# PART III — STRUGGLE
# Chapter 1: "Hold the Gates"
#
# PURPOSE (template note):
#   A defensive scenario.  The player must hold their fortified position
#   against waves of attackers.  Rather than hunting the enemy, the player
#   is the target and must use terrain and positioning to survive.
#
# Key WML concepts demonstrated:
#   • [event] name=side 2 turn N  — fire at the start of the enemy's turn
#   • AI configuration via [ai]   — tune AI behaviour per side
#   • [allow_recruit]             — unlock additional unit types mid-scenario
#   • [disallow_recruit]          — remove unit types from the recruit list
#   • Defensive map design        — using chokepoints and fortified terrain
# =============================================================================

[scenario]
    id=p3_chapter1
    name= _ "Chapter 1: Hold the Gates"
    next_scenario=p3_chapter2

    map_data="
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Mm Mm Mm Mm Mm Gg Gg Gg Gg Mm Mm Mm Mm Mm Gg Gg
Mm Mm Mm Mm Gg Gg Gg Gg Gg Gg Mm Mm Mm Mm Gg Gg
Mm Mm Mm Gg Gg Gg Gg Gg Gg Gg Gg Mm Mm Gg Gg Gg
Gg Gg Gg Uu Uu Uu Ke Uu Uu Uu Gg Gg Gg Gg Gg Gg
Gg Gg Gg Uu Gg Gg Gg Gg Gg Uu Gg Gg Gg Gg Gg Gg
Gg Gg Gg Uu Gg Cv Gg Cv Gg Uu Gg Gg Gg Gg Gg Gg
Gg Gg Gg Uu Gg Gg Gg Gg Gg Uu Gg Gg Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
"

    # Player defends for a fixed number of turns, then relief arrives.
    turns=15
    victory_when_enemies_defeated=no

    # ── Side 1: Defenders ─────────────────────────────────────────────────────
    [side]
        side=1
        controller=human
        team_name=heroes
        user_team_name= _ "Defenders"
        gold=80

        [unit]
            type=General
            id=hero
            name= _ "Aldric"
            canrecruit=yes
            # Place on the keep at the top of the fortress.
            x=7
            y=5
        [/unit]
    [/side]

    # ── Side 2: Cult Assault (spawned from the south) ─────────────────────────
    [side]
        side=2
        controller=ai
        team_name=cult
        user_team_name= _ "Cult Assault"
        gold=0
        income=0
        no_leader=yes

        # [ai] block tunes the AI's behaviour for this side.
        [ai]
            # aggression=1.0 makes the AI attack as aggressively as possible.
            aggression=1.0
            # caution=0.0 means the AI does not pull units back when injured.
            caution=0.0
        [/ai]
    [/side]

    # ── Side 3: Relief Force ──────────────────────────────────────────────────
    [side]
        side=3
        controller=human
        team_name=heroes
        user_team_name= _ "Relief Force"
        gold=0
        no_leader=yes
        hidden=yes
    [/side]

    # ── Prestart ──────────────────────────────────────────────────────────────
    [event]
        name=prestart

        [set_variable]
            name=gate_held_turns
            value=0
        [/set_variable]

        [objectives]
            side=1
            [objective]
                description= _ "Hold the gates for 12 turns"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Aldric"
                condition=lose
            [/objective]
            [objective]
                description= _ "Turns run out"
                condition=lose
            [/objective]
            [gold_carryover]
                bonus=yes
                carryover_percentage=40
            [/gold_carryover]
        [/objectives]
    [/event]

    # ── Start ─────────────────────────────────────────────────────────────────
    [event]
        name=start

        [message]
            speaker=hero
            message= _ "They are coming from the south. The mountains channel them through the pass — use the walls, hold every chokepoint!"
        [/message]

        # First wave spawns immediately at game start.
        [unit]
            type=Orcish Warrior
            side=2
            x=5
            y=12
        [/unit]
        [unit]
            type=Orcish Warrior
            side=2
            x=8
            y=12
        [/unit]
        [unit]
            type=Dark Adept
            side=2
            x=6
            y=11
        [/unit]
    [/event]

    # ── Turn 4: second wave ────────────────────────────────────────────────────
    [event]
        name=turn 4

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "A second wave — archers this time!"
        [/message]

        [unit]
            type=Orcish Crossbowman
            side=2
            x=4
            y=12
        [/unit]
        [unit]
            type=Orcish Crossbowman
            side=2
            x=9
            y=12
        [/unit]
        [unit]
            type=Footpad
            side=2
            x=6
            y=12
        [/unit]
        [unit]
            type=Footpad
            side=2
            x=7
            y=12
        [/unit]

        # Unlock siege units for the defender at turn 4.
        [allow_recruit]
            side=1
            type=Bowman
        [/allow_recruit]
    [/event]

    # ── Turn 8: heavy assault ─────────────────────────────────────────────────
    [event]
        name=turn 8

        [message]
            speaker=hero
            message= _ "Heavy units! Brace the walls!"
        [/message]

        [unit]
            type=Troll
            side=2
            x=5
            y=12
        [/unit]
        [unit]
            type=Troll
            side=2
            x=8
            y=12
        [/unit]
    [/event]

    # ── Turn 12: victory — gates held ─────────────────────────────────────────
    [event]
        name=turn 12

        [if]
            [have_unit]
                id=hero
            [/have_unit]
            [then]
                [message]
                    speaker=narrator
                    image=wesnoth-icon.png
                    message= _ "Relief forces arrive from the north!"
                [/message]

                [unit]
                    type=Paladin
                    name= _ "Commander Ysel"
                    id=relief_commander
                    side=3
                    x=7
                    y=1
                [/unit]

                [message]
                    speaker=relief_commander
                    message= _ "The gates still stand! The tide is broken — well done, Aldric!"
                [/message]

                [endlevel]
                    result=victory
                    bonus=yes
                    carryover_percentage=40
                    carryover_add=no
                    linger_mode=yes
                [/endlevel]
            [/then]
        [/if]
    [/event]

    # ── Defeat ────────────────────────────────────────────────────────────────
    [event]
        name=defeat

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "The gates have fallen. The fortress is lost."
        [/message]

        [endlevel]
            result=defeat
            linger_mode=yes
        [/endlevel]
    [/event]

    # ── Clean up ──────────────────────────────────────────────────────────────
    [event]
        name=victory

        [clear_variable]
            name=gate_held_turns
        [/clear_variable]
    [/event]
[/scenario]
