#textdomain wesnoth-Milestones

# =============================================================================
# PART III — STRUGGLE
# Prologue: "The Point of No Return"
#
# PURPOSE (template note):
#   The prologue for Part III.  Sets up the final act with a tone of
#   inevitability — the hero knows what must be done and commits fully.
# =============================================================================

[scenario]
    id=p3_prologue
    name= _ "Part III Prologue: The Point of No Return"
    next_scenario=p3_chapter1

    map_data="
Gg Gg Gg
Gg Gg Gg
Gg Gg Gg
"

    turns=-1
    victory_when_enemies_defeated=no

    [side]
        side=1
        controller=human
        gold=0
        income=0
        no_leader=yes
        hidden=yes
    [/side]

    [event]
        name=prestart

        [story]
            [part]
                story= _ "The name at the top of the conspiracy was one Aldric had never expected to find. It changed everything — and yet it changed nothing. The work still had to be done."
            [/part]

            [part]
                story= _ "He gathered those who would come. Some for justice. Some for gold. Most simply because they had nowhere else to go."
            [/part]

            [part]
                story= _ "They would fight the last battle of this long war — not because victory was certain, but because the alternative was unthinkable."
            [/part]

            [part]
                story= _ "Part III: Struggle."
            [/part]
        [/story]
    [/event]

    [event]
        name=start

        [endlevel]
            result=victory
            bonus=no
            linger_mode=no
        [/endlevel]
    [/event]
[/scenario]
