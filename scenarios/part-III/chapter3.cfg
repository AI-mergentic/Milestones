#textdomain wesnoth-Milestones

# =============================================================================
# PART III — STRUGGLE
# Chapter 3: "The Final Milestone"
#
# PURPOSE (template note):
#   The campaign's climactic final battle.  Combines everything shown in
#   earlier chapters: boss mechanics, campaign-variable branches, timed
#   reinforcements, and a cinematic ending sequence.
#
# Key WML concepts demonstrated:
#   • Combining multiple WML techniques in one scenario
#   • [event] name=last breath — fires just before a unit would die,
#     allowing a dramatic speech or a "second life" mechanic
#   • [unstore_unit]          — restore a previously stored unit
#   • [endlevel] with custom end screens
#   • Post-victory epilogue sequence before advancing
# =============================================================================

[scenario]
    id=p3_chapter3
    name= _ "Chapter 3: The Final Milestone"
    next_scenario=p3_epilogue

    map_data="
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Mm Mm Mm Gg Gg Gg Gg Gg Mm Mm Mm Gg Gg Gg Gg
Gg Mm Gg Gg Hh Hh Gg Hh Hh Gg Gg Mm Gg Gg Gg Gg
Gg Gg Hh Hh Gg Gg Gg Gg Gg Hh Hh Gg Gg Gg Gg Gg
Gg Uu Ke Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Uu Uu Gg Gg Gg Cv Gg Cv Gg Gg Gg Uu Uu Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Ke Uu Gg Gg
Gg Gg Hh Hh Gg Gg Gg Gg Gg Hh Hh Gg Gg Gg Gg Gg
Gg Mm Gg Gg Hh Hh Gg Hh Hh Gg Gg Mm Gg Gg Gg Gg
Gg Mm Mm Mm Gg Gg Gg Gg Gg Mm Mm Mm Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg Gg
"

    turns=30
    victory_when_enemies_defeated=no

    # ── Side 1: Human Player ──────────────────────────────────────────────────
    [side]
        side=1
        controller=human
        team_name=heroes
        user_team_name= _ "Heroes"
        gold=120

        [unit]
            type=General
            id=hero
            name= _ "Aldric"
            canrecruit=yes
            x=3
            y=5
        [/unit]
    [/side]

    # ── Side 2: The Architect (final boss) ────────────────────────────────────
    [side]
        side=2
        controller=ai
        team_name=shadow
        user_team_name= _ "The Architect"
        gold=150

        [unit]
            type=Lich
            id=the_architect
            name= _ "The Architect"
            canrecruit=yes
            x=13
            y=7
            # Grant extra hit points to make this a worthy final boss.
            [modifications]
                [trait]
                    id=final_boss_trait
                    male_name= _ "Ancient"
                    female_name= _ "Ancient"
                    [effect]
                        apply_to=max_hitpoints
                        increase=30
                    [/effect]
                    [effect]
                        apply_to=hitpoints
                        increase=30
                    [/effect]
                [/trait]
            [/modifications]
        [/unit]
    [/side]

    # ── Side 3: Allied Forces ─────────────────────────────────────────────────
    [side]
        side=3
        controller=ai
        team_name=heroes
        user_team_name= _ "Allies"
        gold=0
        no_leader=yes
        hidden=yes
    [/side]

    # ── Prestart ──────────────────────────────────────────────────────────────
    [event]
        name=prestart

        [set_variable]
            name=architect_phase
            value=1
        [/set_variable]

        [objectives]
            side=1
            [objective]
                description= _ "Slay The Architect"
                condition=win
            [/objective]
            [objective]
                description= _ "Death of Aldric"
                condition=lose
            [/objective]
            [gold_carryover]
                bonus=no
            [/gold_carryover]
        [/objectives]
    [/event]

    # ── Start: final confrontation ────────────────────────────────────────────
    [event]
        name=start

        [message]
            speaker=the_architect
            message= _ "So. You have fought your way through every obstacle I placed before you. I confess — I am almost impressed."
        [/message]

        [message]
            speaker=hero
            message= _ "You orchestrated all of it. Vael. The herald. The raids. Why?"
        [/message]

        [message]
            speaker=the_architect
            message= _ "To find someone worthy. To find you, Aldric. Every trial was a test. And now — the final examination."
        [/message]

        [message]
            speaker=hero
            message= _ "Then let us end this."
        [/message]
    [/event]

    # ── Phase 2 trigger: Architect "last breath" speech ───────────────────────
    # [event] name=last breath fires the moment a unit would die.
    # The unit survives with 1 HP if you do not fire another [endlevel] here.
    [event]
        name=last breath

        [filter]
            id=the_architect
        [/filter]

        [if]
            [variable]
                name=architect_phase
                equals=1
            [/variable]
            [then]
                [set_variable]
                    name=architect_phase
                    value=2
                [/set_variable]

                [message]
                    speaker=the_architect
                    message= _ "You think death can stop me? I have cheated it a thousand times!"
                [/message]

                # Restore the boss to full health — "second wind" mechanic.
                [heal_unit]
                    [filter]
                        id=the_architect
                    [/filter]
                    amount=full
                    animate=yes
                [/heal_unit]

                # Spawn phase-2 guards.
                [unit]
                    type=Revenant
                    side=2
                    x=12
                    y=7
                [/unit]
                [unit]
                    type=Revenant
                    side=2
                    x=14
                    y=7
                [/unit]

                [message]
                    speaker=hero
                    message= _ "He is not dead yet — fight on!"
                [/message]
            [/then]
        [/if]
    [/event]

    # ── Reinforcements at turn 8 ──────────────────────────────────────────────
    [event]
        name=turn 8

        [if]
            [have_unit]
                id=hero
            [/have_unit]
            [then]
                [message]
                    speaker=narrator
                    image=wesnoth-icon.png
                    message= _ "Aldric's allies breach the outer defences and ride to his aid!"
                [/message]

                [unit]
                    type=Paladin
                    name= _ "Commander Ysel"
                    id=ysel_final
                    side=3
                    x=2
                    y=3
                [/unit]
                [unit]
                    type=Spearman
                    side=3
                    x=2
                    y=6
                [/unit]
            [/then]
        [/if]
    [/event]

    # ── The Architect's true death ────────────────────────────────────────────
    [event]
        name=die

        [filter]
            id=the_architect
        [/filter]

        [message]
            speaker=the_architect
            message= _ "Impossible... I... calculated every... variable..."
        [/message]

        [message]
            speaker=hero
            message= _ "You forgot to calculate hope."
        [/message]

        [fire_event]
            name=victory
        [/fire_event]
    [/event]

    # ── Victory ───────────────────────────────────────────────────────────────
    [event]
        name=victory

        [message]
            speaker=hero
            message= _ "It is over. The Architect is gone, and his conspiracy ends with him."
        [/message]

        [if]
            [have_unit]
                id=ysel_final
            [/have_unit]
            [then]
                [message]
                    speaker=ysel_final
                    message= _ "You did it, Aldric. All of it — alone, at first, and then together. This is your milestone."
                [/message]
            [/then]
        [/if]

        [message]
            speaker=hero
            message= _ "Not mine alone. Every step of this journey, there were others. That is the only reason I am standing here."
        [/message]

        [clear_variable]
            name=architect_phase
        [/clear_variable]

        [endlevel]
            result=victory
            bonus=yes
            carryover_percentage=0
            linger_mode=yes
        [/endlevel]
    [/event]

    # ── Defeat ────────────────────────────────────────────────────────────────
    [event]
        name=defeat

        [message]
            speaker=narrator
            image=wesnoth-icon.png
            message= _ "Aldric has fallen before The Architect. The conspiracy lives on."
        [/message]

        [endlevel]
            result=defeat
            linger_mode=yes
        [/endlevel]
    [/event]
[/scenario]
