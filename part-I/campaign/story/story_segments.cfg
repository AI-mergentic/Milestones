#textdomain wesnoth-Milestones

#define STORY_00_PROLOGUE
    [story]
        [part]
            title= _ "Prologue: The Journey Begins"
            background="images/maps/ template_map.webp"
            text= _ "In the land of Eldoria, ancient prophecies whisper of heroes who will shape the fate of kingdoms. As dawn breaks, our tale begins with a gathering of unlikely companions, each drawn by destiny to the crossroads of adventure."
        [/part]
        [part]
            text= _ "The chapters ahead will reveal trials, alliances, and secrets hidden beneath the surface. From the shadowed forests to the sunlit peaks, every step will test their resolve."
        [/part]
        [part]
            text= _ "Let us look upon the map, tracing the path our heroes will follow."
        [/part]
    [/story]
#enddef

#define STORY_01_CHAPTER
    [story]
        [part]
            title= _ "Chapter I: The Awakening"
            background="images/maps/ template_map.webp"
            text= _ "The heroes meet and face their first challenge, forging bonds that will carry them through the trials ahead."
        [/part]
    [/story]
#enddef

#define STORY_02_CHAPTER
    [story]
        [part]
            title= _ "Chapter II: Shadows Rising"
            background="images/maps/ template_map.webp"
            text= _ "Darkness spreads across Eldoria, and new allies are found as the heroes confront hidden dangers."
        [/part]
    [/story]
#enddef

#define STORY_03_CHAPTER
    [story]
        [part]
            title= _ "Chapter III: The Turning Tide"
            background="images/maps/ template_map.webp"
            text= _ "The fate of Eldoria hangs in the balance as the heroes face their greatest test."
        [/part]
    [/story]
#enddef

#define STORY_04_CHAPTER
    [story]
        [part]
            title= _ "Chapter IV: Destiny’s Call"
            background="images/maps/ template_map.webp"
            text= _ "The final confrontation approaches, and the dawn of a new era awaits those who survive."
        [/part]
    [/story]
#enddef

#define STORY_99_EPILOGUE
    [story]
        [part]
            title= _ "Epilogue: A New Dawn"
            background="images/maps/ template_map.webp"
            text= _ "With the journey complete, Eldoria enters a new age, shaped by the deeds and sacrifices of its heroes."
        [/part]
    [/story]
#enddef
