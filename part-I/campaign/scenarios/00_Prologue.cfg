#textdomain wesnoth-Milestones

# -----------------------------------------------------------------------------
# SCENARIO 00: THE PROLOGUE
# -----------------------------------------------------------------------------
# This scenario serves as a reference for how to use the Milestones Template.
# It uses the abstract maps and components integrated from War_Plan_Scarlet.
# -----------------------------------------------------------------------------

[scenario]
    id=00_Prologue
    name=_ "The Prologue"
    # referencing the integrated abstract maps
    # valid options from migrated files: 00_Prologue, 01_ScenarioStage, 02_ScenarioStage …
    map_data="{~add-ons/Milestones/part-I/campaign/maps/00_Prologue.map}"
    # for next_scenario=01_ScenarioStage see # VICTORY EVENT below

    turns=50
    victory_when_enemies_defeated=yes

    {DEFAULT_SCHEDULE}

    # IMPORTANT: This macro initializes the Lua engine and exports variables.
    # It MUST be called inside the [scenario] block.
    {MILESTONES_INIT}

    # Spawn dramatis personae safely at scenario body level (valid for top-level events)
    # see macros.cfg       
    # 0 0 is interpreted by the code as not on the map and placement=map,leader kicks in

    
    
    
    # Character/gender selection loop of your protagonist
    {SELECT_GENDER} # … of protagonistes
    # ––––––––––––––––––––––––––––––––––––––––––––––––––––––––

    # ·······················································
    # The side of all agonists – (the good guys) – sides 1–4
    # Classical Greek drama was limited to a maximum of three speaking actors on stage at any time. 
    # These actors wore masks to play multiple roles.
    #  Protagonistes was the first actor and star, playing the central hero.
    # In Greek, the suffix -agonist comes from agon (struggle/contest).
    # Protagonist: The "first direct struggler."
    # Deutero- (second), trito- (third), and tetra- (fourth) are added here, allowing for 
    # more complex interactions and character dynamics with max 9 players in 'Battle for Wesnoth'.
    # This is _TEAM PROTAGONISTES – sides 1–4

    {SPAWN_DRAMATISPERSONA 1 protagonistes 0 0}
    {SPAWN_DRAMATISPERSONA 1 deuteragonistes 0 0}
    {SPAWN_DRAMATISPERSONA 1 tritagonistes 0 0}
    {SPAWN_DRAMATISPERSONA 1 tetragonistes 0 0}
    [side]
        side=1
        controller=human    # ai,human,null
        canrecruit=yes
        {GENDERWML
            (
            recruit="Mage"  # MALE
            )
            (
            recruit="Orcish Grunt"  # FEMALE
            )
        }
        {PROTAGONISTES_TEAM}
        gold=50
    [/side]

    # ·······················································
    # The side of all antagonists – (the bad guys) – sides 6–9
    # In Greek, the suffix -agonist comes from agon (struggle/contest).
    # Antagonist: The one who "struggles against" the lead.
    # As theater moved away from the Greek "Rule of Three" and into larger ensembles 
    # (like Roman comedy or the Italian Commedia dell'arte), the ranking system 
    # by actor number (1st,2nd,3rd) was replaced by character archetypes.
    # This is _TEAM ANTAGONISTES – sides 6–9 (ai opponents)

    {SPAWN_DRAMATISPERSONA 2 antagonistes 0 0}
    {SPAWN_DRAMATISPERSONA 2 deuterantagonistes 0 0}
    {SPAWN_DRAMATISPERSONA 2 tritantagonistes 0 0}
    {SPAWN_DRAMATISPERSONA 2 tetrantagonistes 0 0}
    [side]
        side=2
        controller=ai
        canrecruit=yes
            recruit="Orcish Grunt"
        {ANTAGONISTES_TEAM}
        gold=100
        [ai]
            aggression=1.0
            caution=0.0
            village_value=0.5
        [/ai]
    [/side]

    # ·······················································
    # The side of the chorus – (the neutral side) – side 5
    # In the core structure of Greek theater, the Chorus was a group of 12–15 performers 
    # who acted as a single unit. They provided the "everyman" perspective.
    # And sang lyrical interludes, and commented on the moral implications of the plot.
    # This is _TEAM CHORUS – side 5
    # SIDE 5: THE NEUTRAL SIDE (chorus)

    {SPAWN_DRAMATISPERSONA 3 chorus 0 0}
    [side]
        side=3
        controller=ai
        canrecruit=yes
            recruit="Mage"
        {CHORUS_TEAM}
        gold=50
    [/side]

    # ·······················································
    # {SPAWN_DRAMATISPERSONA 4 deuteragonistes 0 0}
    [side]
        side=4
        controller=null
        hidden=yes
        canrecruit=no
        {DEUTERAGONISTES_TEAM}
    [/side]
    # {SPAWN_DRAMATISPERSONA 5 deuterantagonistes 0 0}
    [side]
        side=5
        controller=null
        hidden=yes
        canrecruit=no
        {DEUTERANTAGONISTES_TEAM}
    [/side]

    # ·······················································
    # {SPAWN_DRAMATISPERSONA 6 tritagonistes 0 0}
    [side]
        side=6
        controller=null
        hidden=yes
        canrecruit=no
        {TRITAGONISTES_TEAM}
    [/side]
    # {SPAWN_DRAMATISPERSONA 7 tritantagonistes 0 0}
    [side]
        side=7
        controller=null
        hidden=yes
        canrecruit=no
        {TRITANTAGONISTES_TEAM}
    [/side]

    # ·······················································
    # {SPAWN_DRAMATISPERSONA 8 tetragonistes 0 0}
    [side]
        side=8
        controller=null
        hidden=yes
        canrecruit=no
        {TETRAGONISTES_TEAM}
    [/side]
    # {SPAWN_DRAMATISPERSONA 9 tetrantagonistes 0 0}
    [side]
        side=9
        controller=null
        hidden=yes
        canrecruit=no
        {TETRANTAGONISTES_TEAM}
    [/side]
    # ––––––––––––––––––––––––––––––––––––––––––––––––––––––––


    # ––– start of event game structure
    [event]
        name=prestart
    [/event]
    [event]
        name=start
    [/event]

    # VICTORY EVENT
    [event]
        name=enemies defeated
        [message]
            speaker=$milestones.dramatispersonae.protagonistes.id
            message=_ "A decisive victory! Onward to the next milestone."
        [/message]
        [endlevel]
            result=victory
            bonus=yes
            {NEW_GOLD_CARRYOVER 40}
            next_scenario=01_Chapter
        [/endlevel]
    [/event]

[/scenario]
