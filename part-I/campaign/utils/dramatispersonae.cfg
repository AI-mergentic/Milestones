#textdomain wesnoth-Milestones

# ---------------------------------------Dramatispersonæ
# These macros reference the central Lua table in dramatispersonae.lua.
# Changing dramatispersonae.lua will automatically update these values.

# helper to avoid copy‑paste for each role
#define ROLE_ATTRS _KEY
    id=$milestones.dramatispersonae.{_KEY}.id
    save_id=$milestones.dramatispersonae.{_KEY}.saveid
    name=$milestones.dramatispersonae.{_KEY}.name
    unrenamable=$milestones.dramatispersonae.{_KEY}.unrenamable
    type=$milestones.dramatispersonae.{_KEY}.type
    profile=$milestones.dramatispersonae.{_KEY}.profile
    canrecruit=$milestones.dramatispersonae.{_KEY}.canrecruit
    extrarecruit=$milestones.dramatispersonae.{_KEY}.extrarecruit
#enddef

#define PROTAGONISTES
    {ROLE_ATTRS protagonistes}
#enddef

#define DEUTERAGONISTES
    {ROLE_ATTRS deuteragonistes}
#enddef

#define TRITAGONISTES
    {ROLE_ATTRS tritagonistes}
#enddef

#define CHORUS
    {ROLE_ATTRS chorus}
#enddef

#define ANTAGONISTES
    {ROLE_ATTRS antagonistes}
#enddef

#define DEUTERANTAGONISTES
    {ROLE_ATTRS deuterantagonistes}
#enddef

#define TRITANTAGONISTES
    {ROLE_ATTRS tritantagonistes}
