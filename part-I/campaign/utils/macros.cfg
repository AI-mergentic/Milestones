#textdomain wesnoth-Milestones

# ---------------------------------------Milestones Macros
# General purpose macros to speed up campaign development.

#define MILESTONES_INIT
    # Load the Lua engine directly at load time to export variables safely for [side]
    [lua]
        code = "wesnoth.dofile('~add-ons/Milestones/part-I/campaign/lua/main.lua')"
    [/lua]
    
    # Proactive fix: Ensure leaders are present even if variables failed to load
    [event]
        name=prestart
        [lua]
            code = "_G.milestones_ensure_leaders()"
        [/lua]
    [/event]
    
    # Optional: Display init message in debug mode
    [event]
        name=prestart
        [lua]
            code = "_G.milestones_init_msg()"
        [/lua]
    [/event]
#enddef


#define SPAWN_DRAMATISPERSONA _SIDE _ROLE _X _Y
    # Spawn a dramatis persona based on the Lua dramatispersonae.lua table, optionally at coordinates
    # _G.milestones_unit function resides in main.lua
    [event]
        name=prestart
        [lua]
            code = "_G.milestones_unit('{_ROLE}', {_SIDE}, {_X}, {_Y})"
        [/lua]
    [/event]
#enddef

# generic team macro reduces repetition
#define TEAM _FILTER _DISPLAY _SIDENAME
    team_name={_FILTER}
    user_team_name=_ {_DISPLAY}
    side_name=_ {_SIDENAME}
#enddef

# example usage:
#    {TEAM milestones_protagonistes "Milestones Protagonist" "Protagonist"}

# the good side
#define PROTAGONISTES_TEAM
    {TEAM milestones_protagonistes "Milestones Protagonist" "Protagonist"}
#enddef

