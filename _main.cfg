#textdomain wesnoth-Milestones

# =============================================================================
# MILESTONES — A single-player WML template campaign for Battle for Wesnoth
#
# This file is the top-level entry point for the campaign.  Wesnoth loads it
# automatically when the add-on is installed.
#
# Campaign structure:
#   Part I   — Identity  (prologue · 4 chapters · epilogue)
#   Part II  — Discovery (prologue · 5 chapters · epilogue)
#   Part III — Struggle  (prologue · 3 chapters · epilogue)
#
# Template note:
#   Every scenario file contains step-by-step comments explaining the WML
#   concepts it demonstrates.  Read them from top to bottom as a tutorial.
# =============================================================================

[campaign]
    # ── Identity ──────────────────────────────────────────────────────────────
    # 'id' is the internal name used by Wesnoth.  Use only letters, digits,
    # and underscores — no spaces.
    id=Milestones

    # 'name' is the human-readable title shown in the campaign menu.
    # The _ prefix marks the string for translation.
    name= _ "Milestones"

    # Short abbreviation shown in save-game filenames.
    abbrev= _ "MS"

    # Path to a 72×72 (or larger) icon shown in the campaign menu.
    # Uncomment and replace with your own image once you have one.
    # icon=data/core/images/units/human-loyalists/bowman+female.png

    # Campaign description shown in the selection screen.
    description= _ "A single-player campaign template for Wesnoth UMC creators.
Follow a hero through three parts — Identity, Discovery, and Struggle —
and learn how to build your own campaign with clean WML and Lua."

    # The 'id' of the very first scenario the player will see.
    first_scenario=p1_prologue

    # The preprocessor symbol that guards all scenario files below.
    # This prevents symbol collisions when several add-ons are loaded at once.
    define=CAMPAIGN_MILESTONES

    # Difficulty tokens.  These become available as preprocessor symbols in
    # all scenario files: #ifdef EASY / #ifdef NORMAL / #ifdef HARD
    difficulties=EASY,NORMAL,HARD

    # Labels shown in the difficulty selection dialog.
    difficulty_descriptions= _ "Apprentice" + ";" + _ "Veteran" + ";" + _ "Champion"

    # Rank controls the campaign's position in the selection list.
    # Lower values appear first; 0-99 is reserved for mainline campaigns.
    rank=420
[/campaign]

# Every scenario file is only compiled when CAMPAIGN_MILESTONES is defined,
# i.e. while this campaign is active.  This keeps the global namespace clean.
#ifdef CAMPAIGN_MILESTONES

    # ── Part I: Identity ──────────────────────────────────────────────────────
    # Chapters that explore who the hero is and where they come from.
    {~add-ons/Milestones/scenarios/part-I/prologue.cfg}
    {~add-ons/Milestones/scenarios/part-I/chapter1.cfg}
    {~add-ons/Milestones/scenarios/part-I/chapter2.cfg}
    {~add-ons/Milestones/scenarios/part-I/chapter3.cfg}
    {~add-ons/Milestones/scenarios/part-I/chapter4.cfg}
    {~add-ons/Milestones/scenarios/part-I/epilogue.cfg}

    # ── Part II: Discovery ────────────────────────────────────────────────────
    # Chapters in which the hero discovers the wider world and its conflicts.
    {~add-ons/Milestones/scenarios/part-II/prologue.cfg}
    {~add-ons/Milestones/scenarios/part-II/chapter1.cfg}
    {~add-ons/Milestones/scenarios/part-II/chapter2.cfg}
    {~add-ons/Milestones/scenarios/part-II/chapter3.cfg}
    {~add-ons/Milestones/scenarios/part-II/chapter4.cfg}
    {~add-ons/Milestones/scenarios/part-II/chapter5.cfg}
    {~add-ons/Milestones/scenarios/part-II/epilogue.cfg}

    # ── Part III: Struggle ────────────────────────────────────────────────────
    # Chapters showing the hero's decisive struggle and ultimate resolution.
    {~add-ons/Milestones/scenarios/part-III/prologue.cfg}
    {~add-ons/Milestones/scenarios/part-III/chapter1.cfg}
    {~add-ons/Milestones/scenarios/part-III/chapter2.cfg}
    {~add-ons/Milestones/scenarios/part-III/chapter3.cfg}
    {~add-ons/Milestones/scenarios/part-III/epilogue.cfg}

#endif # CAMPAIGN_MILESTONES
